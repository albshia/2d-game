<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MiniCraft (browser)</title>
  <link rel="stylesheet" href="styles/game.css" />
</head>
<body>
  <div id="hint">
    Click to lock mouse. <br/>
    Move: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> • Jump: <kbd>Space</kbd> • Sprint: <kbd>Shift</kbd> <br/>
    Break: Hold left click • Place: Right click • Hotbar: <kbd>1</kbd>-<kbd>9</kbd><kbd>0</kbd>
  </div>
  <canvas id="game"></canvas>
  <div id="healthHud">
    <div id="healthBarBg"><div id="healthBarFill"></div></div>
    <div id="healthText">Health: 20 / 20</div>
  </div>
  <div id="hud">
    <div id="hotbar"></div>
  </div>
  <div id="controls" style="position: fixed; left: 14px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px;">
    <div style="background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.15); border-radius: 12px; padding: 10px; backdrop-filter: blur(6px);">
      <div style="color: rgba(255,255,255,.9); font-size: 12px; margin-bottom: 8px;">Skin</div>
      <div id="skinSelector" style="display: flex; gap: 4px; flex-wrap: wrap;"></div>
    </div>
  </div>

  <script src="js/bootstrap.js"></script>
  <script src="js/world.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/rendering.js"></script>
  <script src="js/game-loop.js"></script>
</body>
</html>
