<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MiniCraft (browser)</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#000; font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    #hud {
      position: fixed; inset: 0; pointer-events: none;
      display:flex; align-items:flex-end; justify-content:center;
      padding: 18px;
    }
    #crosshair {
      position: fixed; left:50%; top:50%;
      width: 14px; height: 14px; transform: translate(-50%,-50%);
      opacity: .9;
    }
    #hotbar {
      display:flex; gap:10px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 14px;
      padding: 10px 12px;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }
    #healthHud {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      pointer-events: none;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 8px 10px;
      backdrop-filter: blur(6px);
    }
    #healthBarBg {
      width: 100%;
      height: 16px;
      border-radius: 10px;
      background: rgba(255,255,255,.14);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.2);
    }
    #healthBarFill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #d32f2f, #ff5252);
      transition: width 100ms linear;
    }
    #healthText {
      margin-top: 5px;
      text-align: center;
      color: rgba(255,255,255,.92);
      font-size: 12px;
      letter-spacing: .2px;
      text-shadow: 0 1px 2px rgba(0,0,0,.6);
    }
    .slot {
      width: 52px; height: 52px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      display:flex; align-items:center; justify-content:center;
      position: relative;
    }
    .slot.selected {
      border-color: rgba(255,255,255,.9);
      box-shadow: 0 0 0 2px rgba(0,0,0,.5) inset, 0 8px 20px rgba(0,0,0,.35);
    }
    .slot .num {
      position:absolute; left:6px; top:4px;
      font-size: 12px; color: rgba(255,255,255,.9);
      text-shadow: 0 1px 2px rgba(0,0,0,.7);
    }
    .slot .swatch {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,.25);
      box-shadow: 0 2px 10px rgba(0,0,0,.35) inset;
    }
    .slot .block-name {
      position: absolute; left: 50%; bottom: 2px; transform: translateX(-50%);
      font-size: 10px; color: rgba(255,255,255,.8);
      text-shadow: 0 1px 2px rgba(0,0,0,.7);
      white-space: nowrap;
    }
    .slot .count {
      position: absolute; right: 6px; bottom: 4px;
      font-size: 12px; color: rgba(255,255,255,.95);
      text-shadow: 0 1px 2px rgba(0,0,0,.8);
      font-weight: 700;
    }
    #hint {
      position: fixed; left: 14px; top: 14px;
      color: rgba(255,255,255,.9);
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 10px 12px;
      max-width: 380px;
      line-height: 1.35;
      pointer-events:none;
      backdrop-filter: blur(6px);
      font-size: 13px;
    }
    #hint kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.06);
    }
  </style>
</head>
<body>
  <div id="hint">
    Click to lock mouse. <br/>
    Move: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> • Jump: <kbd>Space</kbd> • Sprint: <kbd>Shift</kbd> <br/>
    Break: Hold left click • Place: Right click • Hotbar: <kbd>1</kbd>-<kbd>9</kbd><kbd>0</kbd>
  </div>
  <canvas id="game"></canvas>
  <div id="healthHud">
    <div id="healthBarBg"><div id="healthBarFill"></div></div>
    <div id="healthText">Health: 20 / 20</div>
  </div>
  <div id="hud">
    <div id="hotbar"></div>
  </div>

  <!-- Left Controls -->
  <div id="controls" style="position: fixed; left: 14px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px;">
    <div style="background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.15); border-radius: 12px; padding: 10px; backdrop-filter: blur(6px);">
      <div style="color: rgba(255,255,255,.9); font-size: 12px; margin-bottom: 8px;">Skin</div>
      <div id="skinSelector" style="display: flex; gap: 4px; flex-wrap: wrap;"></div>
    </div>
  </div>

  <script>
    // Side (horizontal) view 2D version
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const BLOCKS = [
      { id: 'grass', color: '#4caf50' },
      { id: 'dirt',  color: '#CD853F' },
      { id: 'stone', color: '#9e9e9e' },
      { id: 'log',  color: '#8B4513' },
      { id: 'water', color: '#2196f3' },
      { id: 'planks', color: '#d2b48c' },
      { id: 'bricks', color: '#b71c1c' },
      { id: 'ladder', color: '#a0522d' },
      { id: 'door', color: '#654321' },
      { id: 'glass', color: '#e0f7fa' },
      { id: 'coal_ore', color: '#5a5a5a' },
      { id: 'iron_ore', color: '#e0a86b' },
      { id: 'gold_ore', color: '#d4af37' },
      { id: 'diamond_ore', color: '#42d4f4' },
      { id: 'coal', color: '#2f2f2f' },
      { id: 'iron', color: '#c7c7c7' },
      { id: 'gold', color: '#ffd54f' },
      { id: 'diamond', color: '#7ee7ff' },
    ];
    let selected = 0;
    const HOTBAR_SIZE = 10;
    const MAX_STACK = 64;
    const hotbarInventory = Array.from({length: HOTBAR_SIZE}, () => null);
    const BLOCK_BY_ID = Object.fromEntries(BLOCKS.map(b => [b.id, b]));

    const hotbarEl = document.getElementById('hotbar');
    function getItemLabel(id){
      const def = BLOCK_BY_ID[id];
      if (!def) return id;
      return def.id.charAt(0).toUpperCase() + def.id.slice(1);
    }
    function getDropItemId(blockId){
      if (blockId === 'coal_ore') return 'coal';
      if (blockId === 'iron_ore') return 'iron';
      if (blockId === 'gold_ore') return 'gold';
      if (blockId === 'diamond_ore') return 'diamond';
      return blockId;
    }
    function addItemToInventory(id, amount = 1){
      if (!BLOCK_BY_ID[id]) return false;
      let remaining = amount;
      for (let i = 0; i < HOTBAR_SIZE && remaining > 0; i++) {
        const slot = hotbarInventory[i];
        if (slot && slot.id === id && slot.count < MAX_STACK) {
          const add = Math.min(MAX_STACK - slot.count, remaining);
          slot.count += add;
          remaining -= add;
        }
      }
      for (let i = 0; i < HOTBAR_SIZE && remaining > 0; i++) {
        if (!hotbarInventory[i]) {
          const add = Math.min(MAX_STACK, remaining);
          hotbarInventory[i] = { id, count: add };
          remaining -= add;
        }
      }
      if (remaining !== amount) renderHotbar();
      return remaining === 0;
    }
    function consumeSelectedItem(amount = 1){
      const slot = hotbarInventory[selected];
      if (!slot || slot.count < amount) return false;
      slot.count -= amount;
      if (slot.count <= 0) hotbarInventory[selected] = null;
      renderHotbar();
      return true;
    }
    function renderHotbar(){
      hotbarEl.innerHTML = '';
      for (let i = 0; i < HOTBAR_SIZE; i++) {
        const item = hotbarInventory[i];
        const slot = document.createElement('div');
        slot.className = 'slot' + (i===selected? ' selected':'');
        const num = document.createElement('div'); num.className='num'; num.textContent = i === 9 ? '0' : (i+1);
        slot.appendChild(num);
        if (item) {
          const swatch = document.createElement('div'); swatch.className='swatch';
          swatch.style.background = BLOCK_BY_ID[item.id].color;
          const name = document.createElement('div'); name.className='block-name'; name.textContent = getItemLabel(item.id);
          const count = document.createElement('div'); count.className='count'; count.textContent = String(item.count);
          slot.appendChild(swatch); slot.appendChild(name); slot.appendChild(count);
        }
        hotbarEl.appendChild(slot);
      }
    }
    renderHotbar();
    window.addEventListener('keydown', (e)=>{ const n = parseInt(e.key,10); if (!Number.isNaN(n) && ((n>=1 && n<=9) || n===0)){ selected = n === 0 ? 9 : n-1; renderHotbar(); } if (e.code==='Space' || e.code==='KeyW' || e.code==='ArrowUp') e.preventDefault(); });

    const WIDTH = 500, HEIGHT = 200;
    let tileSize = 24;
    const world = Array.from({length: WIDTH}, ()=>Array.from({length: HEIGHT}, ()=>null));

    // Generate smooth layered terrain using Perlin-like noise
    function generateTerrain() {
      // Create height map with smooth transitions
      const heightMap = [];
      for (let x = 0; x < WIDTH; x++) {
        let h = 90; // 3x deeper world base
        h += Math.sin(x * 0.01) * 6; // Broad wave
        h += Math.sin(x * 0.05) * 3; // Smaller variation
        heightMap[x] = Math.floor(h);
      }

      // Fill terrain from bottom to top
      for (let x = 0; x < WIDTH; x++) {
        const surfaceHeight = heightMap[x];

        for (let y = 0; y < HEIGHT; y++) {
          if (y < surfaceHeight) {
            // Underground layers
            const depthFromSurface = surfaceHeight - y;
            if (depthFromSurface <= 1) {
              world[x][y] = 'grass'; // Grass covering the surface
            } else if (depthFromSurface <= 6) {
              world[x][y] = 'dirt'; // Dirt layer below grass
            } else {
              world[x][y] = 'stone'; // Stone below topsoil
            }
          }
        }
      }

      function carveBlob(cx, cy, rx, ry) {
        const minX = Math.floor(cx - rx), maxX = Math.ceil(cx + rx);
        const minY = Math.floor(cy - ry), maxY = Math.ceil(cy + ry);
        for (let x = minX; x <= maxX; x++) {
          if (x < 0 || x >= WIDTH) continue;
          for (let y = minY; y <= maxY; y++) {
            if (y < 1 || y >= HEIGHT) continue;
            const nx = (x - cx) / rx;
            const ny = (y - cy) / ry;
            const d = nx * nx + ny * ny;
            if (d <= 1.0) {
              const depthFromSurface = heightMap[x] - y;
              // Allow higher caves while still keeping one block of roof.
              if (depthFromSurface >= 4 && y < heightMap[x] - 1) {
                world[x][y] = null;
              }
            }
          }
        }
      }

      // Generate bigger caverns with irregular shapes.
      for (let i = 0; i < 14; i++) {
        const caveX = Math.floor(Math.random() * WIDTH);
        const caveDepth = 4 + Math.random() * 3; // 4-7 blocks below local surface
        const caveY = Math.max(3, Math.floor(heightMap[caveX] - caveDepth));
        const baseR = 10 + Math.random() * 12; // big caves
        const blobCount = 4 + Math.floor(Math.random() * 5);

        for (let b = 0; b < blobCount; b++) {
          const angle = Math.random() * Math.PI * 2;
          const distance = Math.random() * baseR * 1.1;
          const cx = caveX + Math.cos(angle) * distance;
          const cy = caveY + Math.sin(angle) * distance * 0.7;
          const rx = baseR * (0.6 + Math.random() * 0.5);
          const ry = baseR * (0.45 + Math.random() * 0.4);
          carveBlob(cx, cy, rx, ry);
        }

        // Add a short winding tunnel section to vary cave layout.
        let tx = caveX;
        let ty = caveY;
        for (let s = 0; s < 20; s++) {
          tx += (Math.random() * 2.2 - 1.1);
          ty += (Math.random() * 1.6 - 0.8);
          carveBlob(tx, ty, 3.8 + Math.random() * 1.8, 2.8 + Math.random() * 1.4);
        }
      }

      // Seal any underground air connected to the open sky so caves never expose void.
      const skyReachable = Array.from({length: WIDTH}, () => Array(HEIGHT).fill(false));
      const stack = [];
      for (let x = 0; x < WIDTH; x++) {
        for (let y = heightMap[x]; y < HEIGHT; y++) {
          if (world[x][y] === null && !skyReachable[x][y]) {
            skyReachable[x][y] = true;
            stack.push([x, y]);
          }
        }
      }

      while (stack.length) {
        const [x, y] = stack.pop();
        const neighbors = [[x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]];
        for (const [nx, ny] of neighbors) {
          if (nx < 0 || nx >= WIDTH || ny < 0 || ny >= HEIGHT) continue;
          if (skyReachable[nx][ny]) continue;
          if (world[nx][ny] !== null) continue;
          skyReachable[nx][ny] = true;
          stack.push([nx, ny]);
        }
      }

      for (let x = 0; x < WIDTH; x++) {
        for (let y = 0; y < Math.min(heightMap[x], HEIGHT); y++) {
          if (world[x][y] === null && skyReachable[x][y]) {
            const depthFromSurface = heightMap[x] - y;
            world[x][y] = depthFromSurface <= 6 ? 'dirt' : 'stone';
          }
        }
      }

      // Natural ore generation in stone layer.
      function carveOreVeins(oreId, minDepth, maxDepth, veinCount, veinSizeMin, veinSizeMax) {
        for (let i = 0; i < veinCount; i++) {
          const x = Math.floor(Math.random() * WIDTH);
          const depth = minDepth + Math.random() * (maxDepth - minDepth);
          const y = Math.max(1, Math.floor(heightMap[x] - depth));
          const steps = Math.floor(veinSizeMin + Math.random() * (veinSizeMax - veinSizeMin + 1));
          let vx = x;
          let vy = y;
          for (let s = 0; s < steps; s++) {
            vx += Math.floor(Math.random() * 3) - 1;
            vy += Math.floor(Math.random() * 3) - 1;
            if (vx < 1 || vx >= WIDTH - 1 || vy < 1 || vy >= HEIGHT - 1) continue;
            const depthFromSurface = heightMap[vx] - vy;
            if (depthFromSurface >= minDepth && depthFromSurface <= maxDepth && world[vx][vy] === 'stone') {
              world[vx][vy] = oreId;
            }
          }
        }
      }

      carveOreVeins('coal_ore', 8, 70, 220, 4, 10);
      carveOreVeins('iron_ore', 16, 95, 170, 3, 8);
      carveOreVeins('gold_ore', 38, 120, 100, 3, 7);
      carveOreVeins('diamond_ore', 60, 150, 60, 2, 5);

      // Post-processing: cover exposed dirt with grass and avoid exposed stone near surface.
      for (let x = 0; x < WIDTH; x++) {
        for (let y = 0; y < HEIGHT; y++) {
          if (world[x][y] === 'dirt' && (y + 1 >= HEIGHT || world[x][y + 1] === null)) {
            world[x][y] = 'grass';
          }

          if (world[x][y] === 'stone') {
            const depthFromSurface = heightMap[x] - y;
            if (depthFromSurface <= 6 && (y + 1 >= HEIGHT || world[x][y + 1] === null)) {
              world[x][y] = 'dirt';
            }
          }
        }
      }
    }

    generateTerrain();

    function getGrassSpawn(preferredX) {
      const maxRadius = Math.max(preferredX, WIDTH - 1 - preferredX);
      for (let radius = 0; radius <= maxRadius; radius++) {
        const candidates = radius === 0
          ? [preferredX]
          : [preferredX - radius, preferredX + radius];
        for (const x of candidates) {
          if (x < 0 || x >= WIDTH) continue;
          for (let y = HEIGHT - 2; y >= 0; y--) {
            // Spawn only on grass with headroom for the 2-block-tall player.
            if (world[x][y] === 'grass' && !world[x][y + 1] && !world[x][y + 2]) {
              return { x: x + 0.5, y: y + 2 };
            }
          }
        }
      }
      return { x: preferredX + 0.5, y: 95 };
    }

    // Calculate spawn position on grass
    const centerX = Math.floor(WIDTH / 2);
    const spawn = getGrassSpawn(centerX);
    const player = {
      x: spawn.x,
      y: spawn.y,
      vx: 0,
      vy: 0,
      speed: 6,
      w: 0.6,
      h: 2.0,
      model: 'steve',
      facing: 1,
      walkCycle: 0,
      grounded: false,
      handActionTimer: 0,
      handActionSide: 1,
      maxHealth: 20,
      health: 20,
      invulnTimer: 0,
      attackCooldown: 0,
      hurtTimer: 0,
      regenDelay: 0,
      regenAccum: 0
    };
    let spawnPoint = { x: spawn.x, y: spawn.y };
    const PLAYER_COLLIDER_H = 1.9;
    const HAND_ACTION_DURATION = 0.16;
    const keys = { left:false, right:false, jump:false, down:false };

    // Mob system
    const MOB_TYPES = {
      cow: { w: 1.35, h: 1.1, speed: 1.0 },
      sheep: { w: 1.15, h: 1.0, speed: 0.85 },
      pig: { w: 1.1, h: 0.9, speed: 1.2 }
    };
    const HOSTILE_TYPES = {
      zombie: { w: 0.74, h: 1.9, speed: 2.0, maxHealth: 20, damage: 3, hitCooldown: 0.9, color: '#3a8a42' },
      skeleton: { w: 0.68, h: 1.9, speed: 2.2, maxHealth: 20, damage: 2, hitCooldown: 0.75, color: '#d8d8d8' },
      creeper: { w: 0.78, h: 1.8, speed: 1.9, maxHealth: 20, damage: 4, hitCooldown: 1.1, color: '#4caf50' }
    };
    const HOSTILE_AGGRO_RADIUS = 15;
    const CREEPER_FUSE_TIME = 1.1;
    let mobs = [];
    let hostileArrows = [];
    let hostileSpawnTimer = 0;
    const healthBarFill = document.getElementById('healthBarFill');
    const healthText = document.getElementById('healthText');

    function updateHealthUI() {
      const ratio = Math.max(0, Math.min(1, player.health / player.maxHealth));
      healthBarFill.style.width = `${ratio * 100}%`;
      healthText.textContent = `Health: ${Math.ceil(player.health)} / ${player.maxHealth}`;
    }
    updateHealthUI();

    function respawnPlayer() {
      player.x = spawnPoint.x;
      player.y = spawnPoint.y;
      player.vx = 0;
      player.vy = 0;
      player.health = player.maxHealth;
      player.invulnTimer = 1.0;
      player.regenDelay = 0;
      player.regenAccum = 0;
      for (let i = 0; i < hotbarInventory.length; i++) hotbarInventory[i] = null;
      selected = 0;
      renderHotbar();
      updateHealthUI();
    }

    function damagePlayer(amount) {
      if (player.invulnTimer > 0) return;
      player.hurtTimer = 0.25;
      player.health = Math.max(0, player.health - amount);
      player.invulnTimer = 0.45;
      player.regenDelay = 6.0; // Wait before regenerating again.
      player.regenAccum = 0;
      updateHealthUI();
      if (player.health <= 0) {
        respawnPlayer();
      }
    }

    function damageMob(mob, amount) {
      if (!mob || mob.health == null || mob.health <= 0) return;
      mob.hurtTimer = 0.25;
      mob.health -= amount;
    }

    function isNightTime() {
      const t = gameTime / 24000;
      return !(t > 0.25 && t < 0.75);
    }

    function explodeBlocksAt(cx, cy, radius) {
      const minX = Math.max(0, Math.floor(cx - radius));
      const maxX = Math.min(WIDTH - 1, Math.ceil(cx + radius));
      const minY = Math.max(0, Math.floor(cy - radius));
      const maxY = Math.min(HEIGHT - 1, Math.ceil(cy + radius));
      for (let gx = minX; gx <= maxX; gx++) {
        for (let gy = minY; gy <= maxY; gy++) {
          const dx = (gx + 0.5) - cx;
          const dy = (gy + 0.5) - cy;
          if (dx * dx + dy * dy > radius * radius) continue;
          const block = world[gx][gy];
          if (!block) continue;
          if (block === 'door') {
            const lowerY = (gy > 0 && world[gx][gy - 1] === 'door') ? gy - 1 : gy;
            delete doorStates[`${gx},${lowerY}`];
            world[gx][lowerY] = null;
            if (lowerY + 1 < HEIGHT && world[gx][lowerY + 1] === 'door') world[gx][lowerY + 1] = null;
          } else {
            world[gx][gy] = null;
          }
        }
      }
    }

    function fireSkeletonArrow(skeleton, target) {
      const dir = skeleton.facing >= 0 ? 1 : -1;
      const spawnX = skeleton.x + dir * (skeleton.w * 0.48);
      const spawnY = skeleton.y + skeleton.h * 0.08;
      const tx = target ? target.x : (skeleton.x + dir * 8);
      const ty = target ? target.y : skeleton.y;
      const dx = tx - spawnX;
      const dy = ty - spawnY;
      const len = Math.hypot(dx, dy) || 1;
      const speed = 13.0;
      hostileArrows.push({
        x: spawnX,
        y: spawnY,
        vx: (dx / len) * speed,
        vy: (dy / len) * speed,
        life: 4.0,
        damage: 3
      });
    }

    // Time and weather system
    let gameTime = 6000; // 0-24000 (Minecraft-like time), start at day time
    let weather = 'clear'; // 'clear', 'rain'
    let timeSpeed = 1; // How fast time passes
    let weatherTimer = 45 + Math.random() * 85; // Seconds until next natural weather roll
    let clouds = [];

    function rollNaturalWeather() {
      if (weather === 'clear') {
        // Mostly clear, occasional rain.
        weather = Math.random() < 0.24 ? 'rain' : 'clear';
      } else {
        // Rain often clears, sometimes continues.
        weather = Math.random() < 0.72 ? 'clear' : 'rain';
      }
      if (weather === 'rain') {
        weatherTimer = 35 + Math.random() * 70; // Rain lasts ~35-105s
      } else {
        weatherTimer = 55 + Math.random() * 130; // Clear lasts ~55-185s
      }
    }

    function seededNoise(seed) {
      const v = Math.sin(seed * 12.9898) * 43758.5453123;
      return v - Math.floor(v);
    }

    function buildCloudMask(cols, rows, seed) {
      const mask = [];
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const nx = ((x + 0.5) / cols) * 2 - 1;
          const ny = ((y + 0.5) / rows) * 2 - 1;
          const ellipse = (nx * nx * 0.9) + (ny * ny * 1.35);
          const jitter = seededNoise(seed + x * 17 + y * 31) * 0.32;
          const carve = y === rows - 1 && seededNoise(seed + x * 43) > 0.72;
          if (ellipse < 1.03 + jitter && !carve) {
            mask.push({ x, y });
          }
        }
      }
      return mask;
    }

    function initClouds() {
      clouds = [];
      const count = 140;
      for (let i = 0; i < count; i++) {
        const cols = 9 + Math.floor(Math.random() * 8);   // 9-16
        const rows = 4 + Math.floor(Math.random() * 4);   // 4-7
        const cell = 0.7 + Math.random() * 0.5;           // Cloud block size in world tiles
        const seed = Math.random() * 10000;
        const widthTiles = cols * cell;
        const heightTiles = rows * cell;
        clouds.push({

    function getSurfaceHeightAt(x) {
      for (let y = HEIGHT - 1; y >= 0; y--) {
        if (world[x][y] !== null) return y + 1;
      }
      return 1;
    }

    function canSpawnEntityAt(x, y, w, h) {
      const eps = 1e-4;
      const left = Math.floor(x - w / 2 + eps);
      const right = Math.floor(x + w / 2 - eps);
      const bottom = Math.floor(y - h / 2 + eps);
      const top = Math.floor(y + h / 2 - eps);
      if (left < 0 || right >= WIDTH || bottom < 1 || top >= HEIGHT) return false;

      for (let gx = left; gx <= right; gx++) {
        for (let gy = bottom; gy <= top; gy++) {
          if (isSolid(gx, gy)) return false;
        }
      }
      // Need solid support under feet.
      for (let gx = left; gx <= right; gx++) {
        if (!isSolid(gx, bottom - 1)) return false;
      }
      return true;
    }

    function isMobGrounded(mob) {
      const eps = 1e-4;
      const left = Math.floor(mob.x - mob.w / 2 + eps);
      const right = Math.floor(mob.x + mob.w / 2 - eps);
      const below = Math.floor(mob.y - mob.h / 2 - eps);
      for (let gx = left; gx <= right; gx++) {
        if (isSolid(gx, below)) return true;
      }
      return false;
    }

    function shouldMobStepJump(mob) {
      const dir = (mob.direction || mob.facing || 0) >= 0 ? 1 : -1;
      if (dir === 0) return false;
      const footY = mob.y - mob.h / 2;
      const gyFoot = Math.floor(footY + 0.06);
      const gyHead = gyFoot + 1;

      const probeXNear = Math.floor(mob.x + dir * (mob.w / 2 + 0.08));
      const probeXFar = Math.floor(mob.x + dir * (mob.w / 2 + 0.24));

      // A 1-block obstacle ahead with enough headroom above it.
      const nearBlocked = isSolid(probeXNear, gyFoot);
      const farBlocked = isSolid(probeXFar, gyFoot);
      const headroom = !isSolid(probeXNear, gyHead) && !isSolid(probeXFar, gyHead);
      return (nearBlocked || farBlocked) && headroom;
    }

    function canMobOccupyAt(mob, x, y) {
      const eps = 1e-4;
      const left = Math.floor(x - mob.w / 2 + eps);
      const right = Math.floor(x + mob.w / 2 - eps);
      const bottom = Math.floor(y - mob.h / 2 + eps);
      const top = Math.floor(y + mob.h / 2 - eps);
      for (let gx = left; gx <= right; gx++) {
        for (let gy = bottom; gy <= top; gy++) {
          if (isSolid(gx, gy)) return false;
        }
      }
      return true;
    }

    function findHostileSpawnPosition(mode, hostileType) {
      const w = hostileType.w;
      const h = hostileType.h;
      for (let i = 0; i < 80; i++) {
        const x = Math.max(2, Math.min(WIDTH - 3, Math.floor(player.x + (Math.random() - 0.5) * 90)));
        const surface = getSurfaceHeightAt(x);
        let y;
        if (mode === 'cave') {
          const caveTop = Math.max(3, surface - 8);
          if (caveTop <= 3) continue;
          y = 2 + Math.random() * (caveTop - 2);
        } else if (mode === 'rain_day') {
          const caveTop = Math.max(3, surface - 8);
          if (caveTop <= 3) continue;
          y = 2 + Math.random() * (caveTop - 2);
        } else {
          // Night: anywhere (surface and caves)
          if (Math.random() < 0.55) {
            y = surface + h / 2 + 0.05;
          } else {
            y = 2 + Math.random() * Math.max(1, surface - 2);
          }
        }
        if (Math.abs(x + 0.5 - player.x) < 5) continue;
        if (canSpawnEntityAt(x + 0.5, y, w, h)) {
          return { x: x + 0.5, y };
        }
      }
      return null;
    }

    // Mouse placement / removal

    const BREAK_TIME = {
      grass: 0.3,

      stone: 1.25,
      log: 0.9,
      water: Infinity,
      planks: 0.7,
      bricks: 1.7,

    let miningState = { active: false, gx: 0, gy: 0, progress: 0, required: 0 };

    function getMouseGridTarget() {

    function breakBlockAt(gx, gy) {
      if (gx < 0 || gy < 0 || gx >= WIDTH || gy >= HEIGHT) return false;
      const block = world[gx][gy];

      if (block === 'door') {

        addItemToInventory('door', 1);

      player.handActionSide = (gx + 0.5) >= player.x ? 1 : -1;

    function drawMiningCracks(cam) {
      if (!miningState.active || miningState.required <= 0) return;
      const gx = miningState.gx, gy = miningState.gy;
      if (gx < 0 || gy < 0 || gx >= WIDTH || gy >= HEIGHT || !world[gx][gy]) return;

      const progress = Math.max(0, Math.min(1, miningState.progress / miningState.required));
      if (progress <= 0) return;

      const sx = gx * tileSize - cam.x;
      const sy = canvas.height - ((gy + 1) * tileSize - cam.y);
      const lineCount = Math.max(1, Math.ceil(progress * 10));
      const alpha = 0.18 + progress * 0.55;
      const segs = [
        [0.12,0.14,0.48,0.28], [0.52,0.26,0.86,0.1], [0.42,0.42,0.76,0.56],
        [0.18,0.52,0.4,0.82], [0.62,0.56,0.82,0.86], [0.1,0.34,0.22,0.64],
        [0.48,0.14,0.5,0.52], [0.28,0.7,0.62,0.92], [0.72,0.34,0.9,0.62],
        [0.3,0.18,0.7,0.76]
      ];

      ctx.strokeStyle = `rgba(20,20,20,${alpha})`;
      ctx.lineWidth = Math.max(1, tileSize * 0.08);
      for (let i = 0; i < lineCount; i++) {
        const s = segs[i];
        ctx.beginPath();
        ctx.moveTo(sx + s[0] * tileSize, sy + s[1] * tileSize);
        ctx.lineTo(sx + s[2] * tileSize, sy + s[3] * tileSize);
        ctx.stroke();
      }
    }

    function handleBlockAction(e) {
      const { gx, gy, worldPx, worldPy } = getMouseGridTarget();
      if (gx < 0 || gy < 0 || gx >= WIDTH || gy >= HEIGHT) return;
      let acted = false;

      function findHostileAtPointer() {
        for (const mob of mobs) {
          if (!mob.hostile || mob.health <= 0) continue;
          const left = mob.x - mob.w / 2, right = mob.x + mob.w / 2;
          const bottom = mob.y - mob.h / 2, top = mob.y + mob.h / 2;
          const wx = worldPx / tileSize;
          const wy = worldPy / tileSize;
          const inBounds = wx >= left && wx <= right && wy >= bottom && wy <= top;
          const inReach = Math.abs(mob.x - player.x) <= 2.4 && Math.abs(mob.y - player.y) <= 2.6;
          if (inBounds && inReach) return mob;
        }
        return null;
      }

      function getDoorLowerY(x, y) {
        if (world[x][y] !== 'door') return null;
        if (y > 0 && world[x][y - 1] === 'door') return y - 1;
        return y;
      }

      if (e.button === 0 || mouseButtons.left) {
        const hostileTarget = findHostileAtPointer();
        if (hostileTarget && player.attackCooldown <= 0) {
          damageMob(hostileTarget, 4); // Punch damage
          player.attackCooldown = 0.28;
          player.handActionSide = hostileTarget.x >= player.x ? 1 : -1;
          player.handActionTimer = HAND_ACTION_DURATION;
          return;
        }
      } else if (e.button === 1 || e.button === 2) {
        // Middle click or right click on door toggles it
        if (e.button === 1 && world[gx][gy] === 'door') {
          const lowerY = getDoorLowerY(gx, gy);
          const key = `${gx},${lowerY}`;
          doorStates[key] = !doorStates[key];
        } else if (e.button === 2) {
          // Right click to place blocks
          const left = player.x - player.w/2, right = player.x + player.w/2, bottom = player.y - PLAYER_COLLIDER_H/2, top = player.y + PLAYER_COLLIDER_H/2;
          if (gx+1 > left && gx < right && gy+1 > bottom && gy < top) return;

          const selectedItem = hotbarInventory[selected];
          if (!selectedItem || selectedItem.count <= 0) return;
          const selectedBlock = selectedItem.id;
          if (selectedBlock === 'door') {
            // Place 2-block tall door from lower block (clicked) upward
            if (gy >= 0 && gy < HEIGHT-1 && !world[gx][gy] && !world[gx][gy+1]) {
              world[gx][gy] = 'door';
              world[gx][gy+1] = 'door';
              consumeSelectedItem(1);
              acted = true;
              // Initialize door state on lower door block
              const key = `${gx},${gy}`;
              doorStates[key] = false;
            }
          } else {
            if (world[gx][gy] !== selectedBlock) {
              world[gx][gy] = selectedBlock;
              consumeSelectedItem(1);
              acted = true;
            }
          }
        }
      }

      if (acted) {
        player.handActionSide = (gx + 0.5) >= player.x ? 1 : -1;
        player.handActionTimer = HAND_ACTION_DURATION;
      }
    }

    canvas.addEventListener('mousemove', e => {

    canvas.addEventListener('contextmenu', e => e.preventDefault());

    function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; tileSize = Math.max(12, Math.min(36, Math.floor(Math.min(innerWidth, innerHeight) / 25))); }
    window.addEventListener('resize', resize); resize();

    function getCameraOffset(){
      const camX = player.x * tileSize - canvas.width/2 + tileSize/2;
      const camY = player.y * tileSize - canvas.height/2 + tileSize/2;

      // Clamp camera to world boundaries
      const maxCamX = (WIDTH * tileSize) - canvas.width;
      const maxCamY = (HEIGHT * tileSize) - canvas.height;

      return {
        x: Math.max(0, Math.min(camX, maxCamX)),
        y: Math.max(0, Math.min(camY, maxCamY))
      };
    }

    function isSolid(gx,gy){
      if (gx < 0 || gy < 0 || gx >= WIDTH || gy >= HEIGHT) return false;
      const block = world[gx][gy];
      if (block === 'door') {
        // Check if door is open using lower door block state
        const lowerY = (gy > 0 && world[gx][gy - 1] === 'door') ? gy - 1 : gy;
        const key = `${gx},${lowerY}`;
        return !doorStates[key]; // Solid only if door is closed
      }
      return block && block !== 'water' && block !== 'ladder'; // Water and ladder are not solid
    }

    function hasOpenSkyAt(gx, gy){
      if (gx < 0 || gx >= WIDTH) return true;
      const startY = Math.max(gy + 1, 0);
      for (let y = startY; y < HEIGHT; y++) {
        if (isSolid(gx, y)) return false;
      }
      return true;
    }

    function isOnLadder(){
      const eps = 1e-6;
      const left = Math.floor(player.x - player.w/2), right = Math.floor(player.x + player.w/2 - eps);
      const bottom = Math.floor(player.y - PLAYER_COLLIDER_H/2), top = Math.floor(player.y + PLAYER_COLLIDER_H/2 - eps);
      for (let x = left; x <= right; x++) {
        for (let y = bottom; y <= top; y++) {
          if (x >= 0 && x < WIDTH && y >= 0 && y < HEIGHT && world[x][y] === 'ladder') {
            return true;
          }
        }
      }
      return false;
    }

    function resolveCollisions(){
      const eps = 1e-3;
      let left = player.x - player.w/2, right = player.x + player.w/2, bottom = player.y - PLAYER_COLLIDER_H/2, top = player.y + PLAYER_COLLIDER_H/2;
      const minX = Math.floor(left), maxX = Math.floor(right - eps);
      const minY = Math.floor(bottom), maxY = Math.floor(top - eps);
      let grounded = false;

      for (let gx = minX; gx <= maxX; gx++){
        for (let gy = minY; gy <= maxY; gy++){
          if (!isSolid(gx,gy)) continue;
          const tileLeft = gx, tileRight = gx+1, tileBottom = gy, tileTop = gy+1;
          const overlapX = Math.min(right, tileRight) - Math.max(left, tileLeft);
          const overlapY = Math.min(top, tileTop) - Math.max(bottom, tileBottom);
          if (overlapX > 0 && overlapY > 0){
            if (overlapX < overlapY){
              // resolve X
              if (player.x < gx+0.5) player.x -= overlapX + eps; else player.x += overlapX + eps;
            } else {
              // resolve Y
              if (player.y < gy+0.5){ player.y -= overlapY + eps; player.vy = 0; } else { player.y += overlapY + eps; player.vy = 0; grounded = true; }
            }
            left = player.x - player.w/2; right = player.x + player.w/2; bottom = player.y - PLAYER_COLLIDER_H/2; top = player.y + PLAYER_COLLIDER_H/2;
          }
        }
      }
      return grounded;
    }

    function drawSteve(screenX, screenY, pixel, facing, walkCycle, moving) {
      const dir = facing >= 0 ? 1 : -1;
      const legSwing = moving ? Math.sin(walkCycle) * pixel * 0.9 : 0;
      const armSwing = moving ? -Math.sin(walkCycle) * pixel * 0.8 : 0;
      const actionProgress = player.handActionTimer > 0
        ? 1 - (player.handActionTimer / HAND_ACTION_DURATION)
        : 0;
      const actionLift = player.handActionTimer > 0
        ? Math.sin(actionProgress * Math.PI) * pixel * 3.2
        : 0;

      const headW = 8 * pixel, headH = 8 * pixel;
      const bodyW = 8 * pixel, bodyH = 12 * pixel;
      const limbW = 4 * pixel, limbH = 12 * pixel;

      const spriteW = 16 * pixel;
      const centerX = screenX + (player.w * tileSize) / 2;
      const leftX = centerX - spriteW / 2;
      const headX = leftX + 4 * pixel;
      const headY = screenY;
      const bodyX = leftX + 4 * pixel;
      const bodyY = headY + headH;

      // Head
      ctx.fillStyle = '#5b3a22';
      ctx.fillRect(headX, headY, headW, 2 * pixel);
      ctx.fillStyle = '#ddb289';
      ctx.fillRect(headX, headY + 2 * pixel, headW, 6 * pixel);
      // Eyes: separated with exact 50/50 white-purple split per eye
      ctx.fillStyle = '#f2f6ff';
      ctx.fillRect(headX + pixel, headY + 4 * pixel, pixel, 2 * pixel); // Left eye outer half
      ctx.fillRect(headX + 6 * pixel, headY + 4 * pixel, pixel, 2 * pixel); // Right eye outer half
      ctx.fillStyle = '#8c4fcf';
      ctx.fillRect(headX + 2 * pixel, headY + 4 * pixel, pixel, 2 * pixel); // Left eye inner half
      ctx.fillRect(headX + 5 * pixel, headY + 4 * pixel, pixel, 2 * pixel); // Right eye inner half

      // Torso and arms
      ctx.fillStyle = '#4aa3df';
      ctx.fillRect(bodyX, bodyY, bodyW, bodyH);
      const sleeveHeight = 4 * pixel;
      const leftArmY = bodyY + armSwing + (player.handActionSide < 0 ? -actionLift : 0);
      const rightArmY = bodyY - armSwing + (player.handActionSide > 0 ? -actionLift : 0);
      ctx.fillStyle = '#4aa3df';
      ctx.fillRect(bodyX - limbW, leftArmY, limbW, sleeveHeight);
      ctx.fillRect(bodyX + bodyW, rightArmY, limbW, sleeveHeight);
      ctx.fillStyle = '#ddb289';
      ctx.fillRect(bodyX - limbW, leftArmY + sleeveHeight, limbW, limbH - sleeveHeight);
      ctx.fillRect(bodyX + bodyW, rightArmY + sleeveHeight, limbW, limbH - sleeveHeight);

      // Pants/legs
      ctx.fillStyle = '#7b3fc8';
      ctx.fillRect(bodyX, bodyY + bodyH - 2 * pixel, bodyW, 2 * pixel);
      ctx.fillRect(bodyX, bodyY + bodyH + legSwing, limbW, limbH);
      ctx.fillRect(bodyX + bodyW - limbW, bodyY + bodyH - legSwing, limbW, limbH);

      // Outline
      ctx.strokeStyle = '#101010';
      ctx.lineWidth = 1;
      ctx.strokeRect(headX, headY, headW, headH);
      ctx.strokeRect(bodyX, bodyY, bodyW, bodyH);
      ctx.strokeRect(bodyX - limbW, leftArmY, limbW, limbH);
      ctx.strokeRect(bodyX + bodyW, rightArmY, limbW, limbH);
      ctx.strokeRect(bodyX, bodyY + bodyH + legSwing, limbW, limbH);
      ctx.strokeRect(bodyX + bodyW - limbW, bodyY + bodyH - legSwing, limbW, limbH);
    }

    function drawAlex(screenX, screenY, pixel, facing, walkCycle, moving) {
      const dir = facing >= 0 ? 1 : -1;
      const legSwing = moving ? Math.sin(walkCycle) * pixel * 0.9 : 0;
      const armSwing = moving ? -Math.sin(walkCycle) * pixel * 0.8 : 0;
      const actionProgress = player.handActionTimer > 0
        ? 1 - (player.handActionTimer / HAND_ACTION_DURATION)
        : 0;
      const actionLift = player.handActionTimer > 0
        ? Math.sin(actionProgress * Math.PI) * pixel * 3.2
        : 0;

      const headW = 8 * pixel, headH = 8 * pixel;
      const bodyW = 8 * pixel, bodyH = 12 * pixel;
      const armW = 3 * pixel, armH = 12 * pixel; // Alex has slimmer arms
      const legW = 4 * pixel, legH = 12 * pixel;

      const spriteW = 16 * pixel;
      const centerX = screenX + (player.w * tileSize) / 2;
      const leftX = centerX - spriteW / 2;
      const headX = leftX + 4 * pixel;
      const headY = screenY;
      const bodyX = leftX + 4 * pixel;
      const bodyY = headY + headH;

      // Head + hair
      ctx.fillStyle = '#b1612f';
      ctx.fillRect(headX, headY, headW, 2 * pixel);
      ctx.fillStyle = '#dfb691';
      ctx.fillRect(headX, headY + 2 * pixel, headW, 6 * pixel);
      // Eyes
      ctx.fillStyle = '#f2f6ff';
      ctx.fillRect(headX + pixel, headY + 4 * pixel, pixel, 2 * pixel);
      ctx.fillRect(headX + 6 * pixel, headY + 4 * pixel, pixel, 2 * pixel);
      ctx.fillStyle = '#4a9b7e';
      ctx.fillRect(headX + 2 * pixel, headY + 4 * pixel, pixel, 2 * pixel);
      ctx.fillRect(headX + 5 * pixel, headY + 4 * pixel, pixel, 2 * pixel);

      // Torso and arms
      ctx.fillStyle = '#8cbf6f';
      ctx.fillRect(bodyX, bodyY, bodyW, bodyH);
      const sleeveHeight = 4 * pixel;
      const leftArmY = bodyY + armSwing + (player.handActionSide < 0 ? -actionLift : 0);
      const rightArmY = bodyY - armSwing + (player.handActionSide > 0 ? -actionLift : 0);
      ctx.fillStyle = '#8cbf6f';
      ctx.fillRect(bodyX - armW, leftArmY, armW, sleeveHeight);
      ctx.fillRect(bodyX + bodyW, rightArmY, armW, sleeveHeight);
      ctx.fillStyle = '#dfb691';
      ctx.fillRect(bodyX - armW, leftArmY + sleeveHeight, armW, armH - sleeveHeight);
      ctx.fillRect(bodyX + bodyW, rightArmY + sleeveHeight, armW, armH - sleeveHeight);

      // Pants/legs
      ctx.fillStyle = '#6a4a2f';
      ctx.fillRect(bodyX, bodyY + bodyH - 2 * pixel, bodyW, 2 * pixel);
      ctx.fillRect(bodyX, bodyY + bodyH + legSwing, legW, legH);
      ctx.fillRect(bodyX + bodyW - legW, bodyY + bodyH - legSwing, legW, legH);

      // Outline
      ctx.strokeStyle = '#101010';
      ctx.lineWidth = 1;
      ctx.strokeRect(headX, headY, headW, headH);
      ctx.strokeRect(bodyX, bodyY, bodyW, bodyH);
      ctx.strokeRect(bodyX - armW, leftArmY, armW, armH);
      ctx.strokeRect(bodyX + bodyW, rightArmY, armW, armH);
      ctx.strokeRect(bodyX, bodyY + bodyH + legSwing, legW, legH);
      ctx.strokeRect(bodyX + bodyW - legW, bodyY + bodyH - legSwing, legW, legH);
    }

    function drawMobLegs(legBaseY, legH, legW, leftLegX, rightLegX, swing, color) {
      ctx.fillStyle = color;
      ctx.fillRect(leftLegX, legBaseY + swing, legW, legH);
      ctx.fillRect(rightLegX, legBaseY - swing, legW, legH);
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.strokeRect(leftLegX, legBaseY + swing, legW, legH);
      ctx.strokeRect(rightLegX, legBaseY - swing, legW, legH);
    }

    function drawCowMob(mob, screenX, screenY, wPx, hPx, moving) {
      const walk = moving ? Math.sin(mob.walkCycle) * (hPx * 0.04) : 0;
      const headBob = moving ? Math.abs(Math.sin(mob.walkCycle * 1.2)) * (hPx * 0.03) : Math.sin(mob.idleCycle) * (hPx * 0.015);
      const dir = mob.facing >= 0 ? 1 : -1;

      const bodyW = wPx * 0.7, bodyH = hPx * 0.46;
      const bodyX = screenX + (wPx - bodyW) * 0.48;
      const bodyY = screenY + hPx * 0.38;
      const legW = wPx * 0.12, legH = hPx * 0.3;
      const legY = bodyY + bodyH - hPx * 0.02;

      drawMobLegs(legY, legH, legW, bodyX + wPx * 0.02, bodyX + bodyW - legW - wPx * 0.02, walk, '#3b2618');

      ctx.fillStyle = '#5d3b28';
      ctx.fillRect(bodyX, bodyY, bodyW, bodyH);
      ctx.fillStyle = '#f3f3f3';
      ctx.fillRect(bodyX + bodyW * 0.2, bodyY + bodyH * 0.18, bodyW * 0.2, bodyH * 0.24);
      ctx.fillRect(bodyX + bodyW * 0.58, bodyY + bodyH * 0.48, bodyW * 0.18, bodyH * 0.22);

      const headW = wPx * 0.27, headH = hPx * 0.27;
      const headX = dir > 0 ? bodyX + bodyW - headW * 0.18 : bodyX - headW * 0.82;
      const headY = bodyY + hPx * 0.04 + headBob;
      ctx.fillStyle = '#5d3b28';
      ctx.fillRect(headX, headY, headW, headH);
      ctx.fillStyle = '#f0c5b5';
      ctx.fillRect(headX + headW * 0.12, headY + headH * 0.55, headW * 0.76, headH * 0.35);
      ctx.fillStyle = '#111';
      ctx.fillRect(headX + (dir > 0 ? headW * 0.62 : headW * 0.2), headY + headH * 0.32, headW * 0.12, headH * 0.12);

      // Horns and tail
      ctx.fillStyle = '#ccb088';
      ctx.fillRect(headX + headW * 0.05, headY - headH * 0.13, headW * 0.16, headH * 0.12);
      ctx.fillRect(headX + headW * 0.79, headY - headH * 0.13, headW * 0.16, headH * 0.12);
      const tailX = dir > 0 ? bodyX - wPx * 0.04 : bodyX + bodyW;
      ctx.strokeStyle = '#3b2618';
      ctx.lineWidth = Math.max(1, wPx * 0.015);
      ctx.beginPath();
      ctx.moveTo(tailX, bodyY + bodyH * 0.35);
      ctx.lineTo(tailX - dir * wPx * 0.08, bodyY + bodyH * 0.48 + walk * 0.8);
      ctx.stroke();

      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      ctx.strokeRect(bodyX, bodyY, bodyW, bodyH);
      ctx.strokeRect(headX, headY, headW, headH);
    }

    function drawSheepMob(mob, screenX, screenY, wPx, hPx, moving) {
      const walk = moving ? Math.sin(mob.walkCycle) * (hPx * 0.035) : 0;
      const headBob = moving ? Math.abs(Math.sin(mob.walkCycle)) * (hPx * 0.02) : Math.sin(mob.idleCycle) * (hPx * 0.012);
      const dir = mob.facing >= 0 ? 1 : -1;

      const bodyW = wPx * 0.74, bodyH = hPx * 0.52;
      const bodyX = screenX + (wPx - bodyW) * 0.46;
      const bodyY = screenY + hPx * 0.32;
      const legW = wPx * 0.11, legH = hPx * 0.28;
      const legY = bodyY + bodyH - hPx * 0.02;

      drawMobLegs(legY, legH, legW, bodyX + wPx * 0.03, bodyX + bodyW - legW - wPx * 0.03, walk, '#53453d');

      // Wool body
      ctx.fillStyle = '#f4f4f4';
      ctx.fillRect(bodyX, bodyY, bodyW, bodyH);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(bodyX + bodyW * 0.08, bodyY + bodyH * 0.08, bodyW * 0.82, bodyH * 0.65);

      const headW = wPx * 0.24, headH = hPx * 0.24;
      const headX = dir > 0 ? bodyX + bodyW - headW * 0.05 : bodyX - headW * 0.95;
      const headY = bodyY + hPx * 0.14 + headBob;
      ctx.fillStyle = '#4b3d35';
      ctx.fillRect(headX, headY, headW, headH);
      ctx.fillStyle = '#111';
      ctx.fillRect(headX + (dir > 0 ? headW * 0.62 : headW * 0.22), headY + headH * 0.34, headW * 0.12, headH * 0.12);

      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      ctx.strokeRect(bodyX, bodyY, bodyW, bodyH);
      ctx.strokeRect(headX, headY, headW, headH);
    }

    function drawPigMob(mob, screenX, screenY, wPx, hPx, moving) {
      const walk = moving ? Math.sin(mob.walkCycle) * (hPx * 0.04) : 0;
      const headBob = moving ? Math.abs(Math.sin(mob.walkCycle * 1.1)) * (hPx * 0.02) : Math.sin(mob.idleCycle) * (hPx * 0.013);
      const dir = mob.facing >= 0 ? 1 : -1;

      const bodyW = wPx * 0.72, bodyH = hPx * 0.5;
      const bodyX = screenX + (wPx - bodyW) * 0.45;
      const bodyY = screenY + hPx * 0.34;
      const legW = wPx * 0.11, legH = hPx * 0.27;
      const legY = bodyY + bodyH - hPx * 0.02;

      drawMobLegs(legY, legH, legW, bodyX + wPx * 0.04, bodyX + bodyW - legW - wPx * 0.04, walk, '#b66f8c');

      ctx.fillStyle = '#f0a9c0';
      ctx.fillRect(bodyX, bodyY, bodyW, bodyH);
      ctx.fillStyle = '#f7bed0';
      ctx.fillRect(bodyX + bodyW * 0.08, bodyY + bodyH * 0.15, bodyW * 0.75, bodyH * 0.45);

      const headW = wPx * 0.26, headH = hPx * 0.24;
      const headX = dir > 0 ? bodyX + bodyW - headW * 0.02 : bodyX - headW * 0.98;
      const headY = bodyY + hPx * 0.14 + headBob;
      ctx.fillStyle = '#f0a9c0';
      ctx.fillRect(headX, headY, headW, headH);
      ctx.fillStyle = '#d98ca7';
      ctx.fillRect(headX + headW * 0.2, headY + headH * 0.55, headW * 0.6, headH * 0.32);
      ctx.fillStyle = '#111';
      ctx.fillRect(headX + (dir > 0 ? headW * 0.62 : headW * 0.22), headY + headH * 0.32, headW * 0.12, headH * 0.12);

      // Curly tail
      const tailX = dir > 0 ? bodyX - wPx * 0.03 : bodyX + bodyW + wPx * 0.03;
      ctx.strokeStyle = '#cf7f9f';
      ctx.lineWidth = Math.max(1, wPx * 0.02);
      ctx.beginPath();
      ctx.arc(tailX, bodyY + bodyH * 0.45, wPx * 0.04, 0, Math.PI * 1.7);
      ctx.stroke();

      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      ctx.strokeRect(bodyX, bodyY, bodyW, bodyH);
      ctx.strokeRect(headX, headY, headW, headH);
    }

    function drawZombieMob(mob, screenX, screenY, wPx, hPx, moving) {
      const walk = moving ? Math.sin(mob.walkCycle) * (hPx * 0.05) : 0;
      const dir = mob.facing >= 0 ? 1 : -1;
      const headH = hPx * 0.27;
      const bodyH = hPx * 0.4;
      const legH = hPx * 0.33;
      const armW = wPx * 0.24;
      const armH = hPx * 0.33;
      const bodyY = screenY + headH;
      const legY = bodyY + bodyH;

      ctx.fillStyle = '#4ca65a';
      ctx.fillRect(screenX + wPx * 0.15, screenY, wPx * 0.7, headH);
      ctx.fillStyle = '#2f6db2';
      ctx.fillRect(screenX + wPx * 0.2, bodyY, wPx * 0.6, bodyH);
      ctx.fillStyle = '#7b3fc8';
      ctx.fillRect(screenX + wPx * 0.2, legY + walk, wPx * 0.25, legH);
      ctx.fillRect(screenX + wPx * 0.55, legY - walk, wPx * 0.25, legH);
      ctx.fillStyle = '#4ca65a';
      ctx.fillRect(screenX + (dir > 0 ? wPx * 0.02 : wPx * 0.74), bodyY + walk * 0.6, armW, armH);
      ctx.fillRect(screenX + (dir > 0 ? wPx * 0.74 : wPx * 0.02), bodyY - walk * 0.6, armW, armH);
      ctx.fillStyle = '#111';
      ctx.fillRect(screenX + wPx * 0.36, screenY + headH * 0.35, wPx * 0.1, headH * 0.12);
      ctx.fillRect(screenX + wPx * 0.54, screenY + headH * 0.35, wPx * 0.1, headH * 0.12);
    }

    function drawSkeletonMob(mob, screenX, screenY, wPx, hPx, moving) {
      const walk = moving ? Math.sin(mob.walkCycle) * (hPx * 0.04) : 0;
      const headH = hPx * 0.24;
      const bodyY = screenY + headH;
      const legY = bodyY + hPx * 0.4;
      const dir = mob.facing >= 0 ? 1 : -1;

      ctx.fillStyle = '#dcdcdc';
      ctx.fillRect(screenX + wPx * 0.18, screenY, wPx * 0.64, headH);
      ctx.fillRect(screenX + wPx * 0.4, bodyY, wPx * 0.2, hPx * 0.4);
      ctx.fillRect(screenX + wPx * 0.18, bodyY + hPx * 0.08, wPx * 0.2, hPx * 0.36);
      ctx.fillRect(screenX + wPx * 0.62, bodyY + hPx * 0.08, wPx * 0.2, hPx * 0.36);
      ctx.fillRect(screenX + wPx * 0.34, legY + walk, wPx * 0.12, hPx * 0.33);
      ctx.fillRect(screenX + wPx * 0.54, legY - walk, wPx * 0.12, hPx * 0.33);
      ctx.fillStyle = '#111';
      ctx.fillRect(screenX + wPx * 0.34, screenY + headH * 0.36, wPx * 0.1, headH * 0.1);
      ctx.fillRect(screenX + wPx * 0.56, screenY + headH * 0.36, wPx * 0.1, headH * 0.1);

      // Bow (held in front arm)
      const bowX = dir > 0 ? screenX + wPx * 0.76 : screenX + wPx * 0.06;
      const bowY = bodyY + hPx * 0.14;
      ctx.strokeStyle = '#8b5a2b';
      ctx.lineWidth = Math.max(1, wPx * 0.05);
      ctx.beginPath();
      ctx.arc(bowX, bowY + hPx * 0.07, wPx * 0.1, dir > 0 ? -Math.PI / 2 : Math.PI / 2, dir > 0 ? Math.PI / 2 : -Math.PI / 2, dir < 0);
      ctx.stroke();
      ctx.strokeStyle = '#d9d9d9';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(bowX, bowY - hPx * 0.03);
      ctx.lineTo(bowX, bowY + hPx * 0.17);
      ctx.stroke();
    }

    function drawCreeperMob(mob, screenX, screenY, wPx, hPx, moving) {
      const walk = moving ? Math.sin(mob.walkCycle) * (hPx * 0.03) : 0;
      const pixel = Math.max(1, Math.floor(Math.min(wPx, hPx) / 12));
      const headX = screenX + wPx * 0.2;
      const headY = screenY;
      const headW = wPx * 0.6;
      const headH = hPx * 0.32;
      const bodyX = screenX + wPx * 0.22;
      const bodyY = headY + headH + pixel * 0.6; // visible separation between head and body
      const bodyW = wPx * 0.56;
      const bodyH = hPx * 0.46;

      const fusing = mob.fuseTimer != null && mob.fuseTimer > 0;
      const flash = fusing && Math.floor(mob.fuseTimer * 20) % 2 === 0;
      const baseGreen = flash ? '#b8ff95' : '#67b64b';
      const darkGreen = flash ? '#93d873' : '#4b9a3b';
      const lightGreen = flash ? '#ccffac' : '#82c65f';
      const legGreen = flash ? '#8fd96d' : '#4c943a';

      // Head
      ctx.fillStyle = baseGreen;
      ctx.fillRect(headX, headY, headW, headH);
      ctx.fillStyle = darkGreen;
      for (let y = 0; y < headH; y += pixel * 2) {
        for (let x = 0; x < headW; x += pixel * 2) {
          if (((x / pixel) + (y / pixel)) % 3 === 0) {
            ctx.fillRect(headX + x, headY + y, pixel, pixel);
          }
        }
      }
      // Head face
      const faceY = headY + headH * 0.2;
      ctx.fillStyle = '#111';
      ctx.fillRect(headX + headW * 0.23, faceY, headW * 0.14, headH * 0.22);
      ctx.fillRect(headX + headW * 0.63, faceY, headW * 0.14, headH * 0.22);
      ctx.fillRect(headX + headW * 0.42, faceY + headH * 0.2, headW * 0.16, headH * 0.32);
      ctx.fillRect(headX + headW * 0.32, faceY + headH * 0.38, headW * 0.36, headH * 0.12);
      ctx.fillRect(headX + headW * 0.34, faceY + headH * 0.5, headW * 0.12, headH * 0.16);
      ctx.fillRect(headX + headW * 0.54, faceY + headH * 0.5, headW * 0.12, headH * 0.16);

      // Base body
      ctx.fillStyle = baseGreen;
      ctx.fillRect(bodyX, bodyY, bodyW, bodyH);

      // Minecraft-like green dither pattern
      ctx.fillStyle = darkGreen;
      for (let y = 0; y < bodyH; y += pixel * 2) {
        for (let x = 0; x < bodyW; x += pixel * 2) {
          if (((x / pixel) + (y / pixel)) % 3 === 0) {
            ctx.fillRect(bodyX + x, bodyY + y, pixel, pixel);
          }
        }
      }
      ctx.fillStyle = lightGreen;
      for (let y = pixel; y < bodyH; y += pixel * 3) {
        for (let x = pixel; x < bodyW; x += pixel * 3) {
          if (((x / pixel) + (y / pixel)) % 2 === 0) {
            ctx.fillRect(bodyX + x, bodyY + y, pixel, pixel);
          }
        }
      }

      // Four legs
      const legW = bodyW * 0.19;
      const legH = hPx * 0.22;
      const legY = bodyY + bodyH - pixel * 0.3;
      ctx.fillStyle = legGreen;
      ctx.fillRect(bodyX + bodyW * 0.02, legY + walk, legW, legH);
      ctx.fillRect(bodyX + bodyW * 0.29, legY - walk, legW, legH);
      ctx.fillRect(bodyX + bodyW * 0.56, legY + walk, legW, legH);
      ctx.fillRect(bodyX + bodyW * 0.79, legY - walk, legW, legH);

      // Outline
      ctx.strokeStyle = 'rgba(0,0,0,0.38)';
      ctx.lineWidth = 1;
      ctx.strokeRect(headX, headY, headW, headH);
      ctx.strokeRect(bodyX, bodyY, bodyW, bodyH);
    }

    function drawMob(mob, cam) {
      const worldPx = mob.x * tileSize;
      const worldPy = mob.y * tileSize;
      const screenX = worldPx - cam.x - (mob.w * tileSize) / 2;
      const screenY = canvas.height - (worldPy - cam.y) - (mob.h * tileSize) / 2;
      const wPx = mob.w * tileSize;
      const hPx = mob.h * tileSize;
      const moving = Math.abs(mob.vx) > 0.08;

      if (mob.hostile) {
        if (mob.type === 'zombie') drawZombieMob(mob, screenX, screenY, wPx, hPx, moving);
        else if (mob.type === 'skeleton') drawSkeletonMob(mob, screenX, screenY, wPx, hPx, moving);
        else drawCreeperMob(mob, screenX, screenY, wPx, hPx, moving);
      } else if (mob.type === 'cow') {
        drawCowMob(mob, screenX, screenY, wPx, hPx, moving);
      } else if (mob.type === 'sheep') {
        drawSheepMob(mob, screenX, screenY, wPx, hPx, moving);
      } else {
        drawPigMob(mob, screenX, screenY, wPx, hPx, moving);
      }

      // Health bar over hostile mobs
      if (mob.hostile) {
        const ratio = Math.max(0, mob.health / mob.maxHealth);
        const barW = wPx * 0.9;
        const barX = screenX + (wPx - barW) / 2;
        const barY = screenY - 8;
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(barX, barY, barW, 4);
        ctx.fillStyle = '#e53935';
        ctx.fillRect(barX, barY, barW * ratio, 4);
      }

      // Red hurt flash
      if (mob.hurtTimer > 0) {
        ctx.fillStyle = 'rgba(255, 45, 45, 0.35)';
        ctx.fillRect(screenX, screenY, wPx, hPx);
      }
    }

    function autoSpawnHostiles(dt) {
      const hostileCount = mobs.filter(m => m.hostile).length;
      let mode = 'cave';
      let cap = 14;
      let interval = 3.6;

      if (isNightTime()) {
        mode = 'night_any';
        cap = 38;
        interval = 1.3;
      } else if (weather === 'rain') {
        mode = 'rain_day';
        cap = 16;
        interval = 2.7;
      }

      if (hostileCount >= cap) return;
      hostileSpawnTimer -= dt;
      if (hostileSpawnTimer > 0) return;
      hostileSpawnTimer = interval * (0.7 + Math.random() * 0.7);

      const types = ['zombie', 'skeleton', 'creeper'];
      const type = types[Math.floor(Math.random() * types.length)];
      const pos = findHostileSpawnPosition(mode, HOSTILE_TYPES[type]);
      if (pos) spawnHostile(type, pos.x, pos.y);
    }

    function draw(){
      // Update time
      gameTime = (gameTime + timeSpeed) % 24000;

      // Calculate lighting based on time (darker at night)
      const timeOfDay = gameTime / 24000;
      let brightness = 1;
      if (timeOfDay > 0.25 && timeOfDay < 0.75) { // Day time
        brightness = 1;
      } else { // Night time
        brightness = 0.3;
      }

      ctx.clearRect(0,0,canvas.width,canvas.height);
      const cam = getCameraOffset();

      const startX = Math.floor(cam.x / tileSize) - 1;
      const endX = Math.ceil((cam.x + canvas.width) / tileSize) + 1;
      const startY = Math.floor(cam.y / tileSize) - 1;
      const endY = Math.ceil((cam.y + canvas.height) / tileSize) + 1;

      for (let gx = startX; gx <= endX; gx++){
        for (let gy = startY; gy <= endY; gy++){
          const sx = gx * tileSize - cam.x;
          const sy = canvas.height - ((gy+1) * tileSize - cam.y);
          if (gx < 0 || gy < 0 || gx >= WIDTH || gy >= HEIGHT){
            // Sky with time-based color
            let skyColor = '#87CEEB'; // Day sky
            if (brightness < 0.5) skyColor = '#191970'; // Night sky
            ctx.fillStyle = skyColor;
            ctx.fillRect(sx, sy, tileSize, tileSize);
            continue;
          }
          const t = world[gx][gy];
          if (t){
            const block = BLOCKS.find(b=>b.id===t);
            ctx.fillStyle = block.color;
            // Apply brightness to blocks
            if (brightness < 1) {
              const rgb = hexToRgb(block.color);
              ctx.fillStyle = `rgb(${Math.floor(rgb.r * brightness)}, ${Math.floor(rgb.g * brightness)}, ${Math.floor(rgb.b * brightness)})`;
            }
            ctx.fillRect(sx, sy, tileSize, tileSize);
          } else {
            // Render void/air blocks with sky color
            let skyColor = '#87CEEB'; // Day sky
            if (brightness < 0.5) skyColor = '#191970'; // Night sky
            ctx.fillStyle = skyColor;
            ctx.fillRect(sx, sy, tileSize, tileSize);
          }
          ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.strokeRect(sx+0.5, sy+0.5, tileSize-1, tileSize-1);
        }
      }

      // Pixel clouds: fewer in clear weather, more in rain.
      const cloudCount = weather === 'rain' ? clouds.length : Math.floor(clouds.length * 0.72);
      const cloudColor = weather === 'rain'
        ? (brightness < 0.5 ? 'rgba(120,130,145,0.52)' : 'rgba(155,165,180,0.66)')
        : (brightness < 0.5 ? 'rgba(190,200,220,0.28)' : 'rgba(250,255,255,0.72)');
      ctx.fillStyle = cloudColor;
      for (let i = 0; i < cloudCount; i++) {
        const c = clouds[i];
        const cellPx = c.cell * tileSize;
        const cloudW = c.widthTiles * tileSize;
        const cloudH = c.heightTiles * tileSize;
        const cloudX = c.cx * tileSize - cam.x - cloudW / 2;
        const cloudY = canvas.height - (c.cy * tileSize - cam.y) - cloudH / 2;
        for (const cell of c.mask) {
          ctx.fillRect(cloudX + cell.x * cellPx, cloudY + cell.y * cellPx, cellPx, cellPx);
        }
      }

      // Weather effects
      if (weather === 'rain') {
        const rainColor = brightness >= 1
          ? 'rgba(55, 95, 165, 0.72)'   // Darker rain in daytime
          : 'rgba(100, 149, 237, 0.6)'; // Existing rain at night
        ctx.fillStyle = rainColor;
        for (let i = 0; i < 100; i++) {
          const x = Math.random() * canvas.width;
          const y = Math.random() * canvas.height;
          const worldPx = x + cam.x;
          const worldPy = (canvas.height - y) + cam.y;
          const gx = Math.floor(worldPx / tileSize);
          const gy = Math.floor(worldPy / tileSize);
          if (!hasOpenSkyAt(gx, gy)) continue;
          ctx.fillRect(x, y, 1, 8);
        }
      }

      // Render mobs
      mobs.forEach(mob => {
        drawMob(mob, cam);
      });

      // Render hostile arrows
      ctx.strokeStyle = '#3b2a1a';
      ctx.lineWidth = Math.max(1, tileSize * 0.07);
      hostileArrows.forEach(a => {
        const sx = a.x * tileSize - cam.x;
        const sy = canvas.height - (a.y * tileSize - cam.y);
        const ex = sx + (a.vx >= 0 ? 7 : -7);
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, sy - a.vy * 0.4);
        ctx.stroke();
      });

      // player
      const worldPx = player.x * tileSize;
      const worldPy = player.y * tileSize;
      const screenX = worldPx - cam.x - (player.w*tileSize)/2;
      const screenY = canvas.height - (worldPy - cam.y) - (player.h*tileSize)/2;

      const moving = Math.abs(player.vx) > 0.15 && player.grounded;
      const charPixel = (player.h * tileSize) / 32;
      if (player.model === 'alex') {
        drawAlex(screenX, screenY, charPixel, player.facing, player.walkCycle, moving);
      } else {
        drawSteve(screenX, screenY, charPixel, player.facing, player.walkCycle, moving);
      }
      drawMiningCracks(cam);
      if (player.hurtTimer > 0) {
        ctx.fillStyle = 'rgba(255, 45, 45, 0.35)';
        ctx.fillRect(screenX, screenY, player.w * tileSize, player.h * tileSize);
      }

      // highlight mouse tile
      const cam2 = getCameraOffset();
      const worldPxM = mouse.x + cam2.x; const worldPyM = (canvas.height - mouse.y) + cam2.y;
      const hx = Math.floor(worldPxM / tileSize); const hy = Math.floor(worldPyM / tileSize);
      const hsx = hx * tileSize - cam2.x; const hsy = canvas.height - ((hy+1) * tileSize - cam2.y);
      if (hx>=0 && hy>=0 && hx<WIDTH && hy<HEIGHT){ ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=2; ctx.strokeRect(hsx+1, hsy+1, tileSize-2, tileSize-2); }

      // Draw block tooltip
      if (blockTooltip.show) {
        ctx.save();
        ctx.font = '14px system-ui, -apple-system, Segoe UI, Roboto, Arial';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';

        const padding = 8;
        const textWidth = ctx.measureText(blockTooltip.blockName).width;
        const tooltipWidth = textWidth + padding * 2;
        const tooltipHeight = 20;

        // Tooltip background
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(blockTooltip.x, blockTooltip.y, tooltipWidth, tooltipHeight);

        // Tooltip border
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(blockTooltip.x, blockTooltip.y, tooltipWidth, tooltipHeight);

        // Tooltip text
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillText(blockTooltip.blockName, blockTooltip.x + padding, blockTooltip.y + padding - 2);

        ctx.restore();
      }
    }

    // Helper function to convert hex to RGB
    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : null;
    }

    let last = performance.now();
    function loop(t){
      const dt = Math.min((t-last)/1000, 0.05); last = t;
      // input
      if (player.handActionTimer > 0) {
        player.handActionTimer = Math.max(0, player.handActionTimer - dt);
      }
      if (player.attackCooldown > 0) {
        player.attackCooldown = Math.max(0, player.attackCooldown - dt);
      }
      if (player.invulnTimer > 0) {
        player.invulnTimer = Math.max(0, player.invulnTimer - dt);
      }
      if (player.hurtTimer > 0) {
        player.hurtTimer = Math.max(0, player.hurtTimer - dt);
      }
      // Natural weather cycle
      weatherTimer -= dt;
      if (weatherTimer <= 0) {
        rollNaturalWeather();
      }
      if (player.regenDelay > 0) {
        player.regenDelay = Math.max(0, player.regenDelay - dt);
      } else if (player.health > 0 && player.health < player.maxHealth) {
        player.regenAccum += dt;
        if (player.regenAccum >= 2.0) {
          player.regenAccum = 0;
          player.health = Math.min(player.maxHealth, player.health + 1);
          updateHealthUI();
        }
      }
      // Cloud drift
      for (const c of clouds) {
        c.cx += c.speed * dt * (weather === 'rain' ? 1.2 : 1.0);
        if (c.cx - c.widthTiles / 2 > WIDTH + 8) {
          c.cx = -8 - c.widthTiles / 2;
          c.cy = HEIGHT * 0.44 + Math.random() * (HEIGHT * 0.38);
        }
      }
      // Timed block mining (hold left click).
      if (mouseButtons.left) {
        const { gx, gy } = getMouseGridTarget();
        if (gx < 0 || gy < 0 || gx >= WIDTH || gy >= HEIGHT || !world[gx][gy]) {
          resetMining();
        } else {
          if (!miningState.active || miningState.gx !== gx || miningState.gy !== gy) {
            miningState.active = true;
            miningState.gx = gx;
            miningState.gy = gy;
            miningState.progress = 0;
          }
          const blockId = world[gx][gy];
          const required = BREAK_TIME[blockId] ?? 0.8;
          miningState.required = required;
          if (Number.isFinite(required)) {
            miningState.progress += dt;
            if (miningState.progress >= required) {
              breakBlockAt(gx, gy);
              resetMining();
            }
          }
        }
      } else {
        resetMining();
      }
      let ax = 0;
      if (keys.left) ax -= 1; if (keys.right) ax += 1;
      const targetVx = ax * player.speed;
      // simple accel
      player.vx += (targetVx - player.vx) * Math.min(10*dt, 1);
      if (Math.abs(player.vx) > 0.1) player.facing = player.vx > 0 ? 1 : -1;
      // gravity
      const onLadder = isOnLadder();
      if (!onLadder) {
        player.vy += -25 * dt;
      } else {
        // On ladder - allow climbing
        let climbSpeed = 0;
        if (keys.jump) climbSpeed += player.speed * 0.8; // Up
        if (keys.down) climbSpeed -= player.speed * 0.8; // Down
        player.vy += (climbSpeed - player.vy) * Math.min(15*dt, 1); // Smooth climbing
      }
      // jump (if grounded)
      // apply movement
      player.x += player.vx * dt;
      player.y += player.vy * dt;

      const grounded = resolveCollisions();
      player.grounded = grounded;
      if (grounded && keys.jump && !onLadder){ player.vy = 9.0; }
      if (Math.abs(player.vx) > 0.15 && grounded) {
        player.walkCycle += dt * 14;
      }

      // Clamp horizontal bounds; allow falling below world so void death can trigger.
      player.x = Math.max(0.2, Math.min(WIDTH-0.2, player.x));
      player.y = Math.min(HEIGHT-0.2, player.y);
      if (player.y < -1) {
        player.health = 0;
        updateHealthUI();
        respawnPlayer();
      }

      // Update hostile arrows
      for (let i = hostileArrows.length - 1; i >= 0; i--) {
        const a = hostileArrows[i];
        a.life -= dt;
        a.vy += -6.5 * dt;
        a.x += a.vx * dt;
        a.y += a.vy * dt;

        const gx = Math.floor(a.x);
        const gy = Math.floor(a.y);
        if (a.life <= 0 || gx < 0 || gx >= WIDTH || gy < 0 || gy >= HEIGHT || isSolid(gx, gy)) {
          hostileArrows.splice(i, 1);
          continue;
        }

        const left = player.x - player.w / 2;
        const right = player.x + player.w / 2;
        const bottom = player.y - PLAYER_COLLIDER_H / 2;
        const top = player.y + PLAYER_COLLIDER_H / 2;
        if (a.x >= left && a.x <= right && a.y >= bottom && a.y <= top) {
          damagePlayer(a.damage);
          hostileArrows.splice(i, 1);
        }
      }

      autoSpawnHostiles(dt);

      // Update mobs
      mobs.forEach((mob) => {
        if (mob.hostile) {
          const dx = player.x - mob.x;
          const dy = player.y - mob.y;
          const dist = Math.hypot(dx, dy);
          const inAggro = dist <= HOSTILE_AGGRO_RADIUS && Math.abs(dy) < 6;
          if (inAggro) {
            // All hostile mobs chase the player; attack style depends on mob type.
            mob.direction = dx >= 0 ? 1 : -1;
            if (mob.type === 'skeleton') {
              if (mob.rangedCooldown == null) mob.rangedCooldown = 0;
              mob.rangedCooldown = Math.max(0, mob.rangedCooldown - dt);
              // Skeletons keep chasing but attack by shooting.
              if (dist >= 3.5 && dist <= HOSTILE_AGGRO_RADIUS && Math.abs(dy) < 4.2 && mob.rangedCooldown <= 0) {
                fireSkeletonArrow(mob, player);
                mob.rangedCooldown = 1.15 + Math.random() * 0.75;
              }
            }
          } else {
            mob.moveTimer -= dt;
            if (mob.moveTimer <= 0) {
              mob.direction = Math.random() > 0.5 ? 1 : -1;
              mob.moveTimer = 1.2 + Math.random() * 1.8;
            }
          }
          if (mob.attackTimer > 0) mob.attackTimer = Math.max(0, mob.attackTimer - dt);
          if (mob.type === 'creeper') {
            if (dist <= 4.0 && Math.abs(dy) < 2.5) {
              if (mob.fuseTimer < 0) mob.fuseTimer = CREEPER_FUSE_TIME;
            } else {
              mob.fuseTimer = -1;
            }

            if (mob.fuseTimer > 0) {
              mob.fuseTimer -= dt;
              if (mob.fuseTimer <= 0) {
                // Creeper dies on explosion; player dies if within blast radius.
                explodeBlocksAt(mob.x, mob.y, 2.6);
                const blastDist = Math.hypot(player.x - mob.x, player.y - mob.y);
                if (blastDist < 1.9) {
                  player.health = 0;
                  updateHealthUI();
                  respawnPlayer();
                } else if (blastDist < 5.0) {
                  // Further from center: heavy but non-lethal-style blast damage.
                  const t = (blastDist - 1.9) / (5.0 - 1.9); // 0 near core -> 1 at edge
                  const dmg = 10 - t * 7; // ~10 down to ~3
                  damagePlayer(Math.max(2, dmg));
                }
                mob.health = 0;
                return;
              }
            }
          } else if (dist < 1.35 && Math.abs(dy) < 1.6 && mob.attackTimer <= 0) {
            damagePlayer(mob.damage);
            mob.attackTimer = mob.hitCooldown;
          }
        } else {
          // Passive mob wandering
          mob.moveTimer -= dt;
          if (mob.moveTimer <= 0) {
            mob.direction = Math.random() > 0.5 ? 1 : -1;
            mob.moveTimer = 2 + Math.random() * 3;
          }
        }
        if (mob.hurtTimer > 0) {
          mob.hurtTimer = Math.max(0, mob.hurtTimer - dt);
        }

        const targetVx = mob.direction * mob.speed;
        mob.vx += (targetVx - mob.vx) * Math.min(5 * dt, 1);
        if (Math.abs(mob.vx) > 0.04) mob.facing = mob.vx > 0 ? 1 : -1;
        mob.walkCycle += dt * (6 + mob.speed * 2);
        mob.idleCycle += dt * 2.4;
        if (isMobGrounded(mob) && shouldMobStepJump(mob)) {
          mob.vy = Math.max(mob.vy, 7.0); // ~1 block max jump height
        }
        mob.vy += -25 * dt;

        mob.x += mob.vx * dt;
        mob.y += mob.vy * dt;

        const eps = 1e-3;
        let left = mob.x - mob.w/2, right = mob.x + mob.w/2, bottom = mob.y - mob.h/2, top = mob.y + mob.h/2;
        const minX = Math.floor(left), maxX = Math.floor(right - eps);
        const minY = Math.floor(bottom), maxY = Math.floor(top - eps);
        let hitWallX = false;
        let steppedUp = false;

        for (let gx = minX; gx <= maxX; gx++){
          for (let gy = minY; gy <= maxY; gy++){
            if (!isSolid(gx,gy)) continue;
            const tileLeft = gx, tileRight = gx+1, tileBottom = gy, tileTop = gy+1;
            const overlapX = Math.min(right, tileRight) - Math.max(left, tileLeft);
            const overlapY = Math.min(top, tileTop) - Math.max(bottom, tileBottom);
            if (overlapX > 0 && overlapY > 0){
              if (overlapX < overlapY){
                const dir = (mob.vx >= 0 ? 1 : -1);
                if (!steppedUp && isMobGrounded(mob) && shouldMobStepJump(mob)) {
                  const stepX = mob.x + dir * 0.16;
                  const stepY = mob.y + 1.0;
                  if (canMobOccupyAt(mob, stepX, stepY)) {
                    mob.x = stepX;
                    mob.y = stepY;
                    mob.vy = Math.max(mob.vy, 7.0);
                    steppedUp = true;
                    left = mob.x - mob.w/2; right = mob.x + mob.w/2; bottom = mob.y - mob.h/2; top = mob.y + mob.h/2;
                    continue;
                  }
                }
                if (mob.x < gx+0.5) mob.x -= overlapX + eps; else mob.x += overlapX + eps;
                mob.vx = 0;
                hitWallX = true;
              } else {
                if (mob.y < gy+0.5){ mob.y -= overlapY + eps; mob.vy = 0; } else { mob.y += overlapY + eps; mob.vy = 0; }
              }
              left = mob.x - mob.w/2; right = mob.x + mob.w/2; bottom = mob.y - mob.h/2; top = mob.y + mob.h/2;
            }
          }
        }

        // Strong fallback: if grounded and blocked horizontally, hop over one-block obstacles.
        if (hitWallX && isMobGrounded(mob)) {
          const dir = (mob.facing || mob.direction || 1) >= 0 ? 1 : -1;
          const probeX = Math.floor(mob.x + dir * (mob.w / 2 + 0.1));
          const footY = Math.floor(mob.y - mob.h / 2 + 0.08);
          if (isSolid(probeX, footY) && !isSolid(probeX, footY + 1)) {
            mob.y += 1.0; // Direct 1-block step-up fallback when blocked.
            mob.vy = Math.max(mob.vy, 7.0);
            mob.vx = dir * Math.max(mob.speed * 0.6, 1.0);
          }
        }

        mob.x = Math.max(0.2, Math.min(WIDTH-0.2, mob.x));
        mob.y = Math.min(HEIGHT-0.2, mob.y);
        if (mob.y < -1) {
          if (mob.hostile) mob.health = 0;
          else mob.dead = true;
        }
      });

      mobs = mobs.filter(m => !m.dead && (!m.hostile || m.health > 0));

      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
